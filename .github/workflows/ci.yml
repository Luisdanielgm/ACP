name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/hub/frontend/package-lock.json

      - name: Build managed SPA (route-baseline test needs the mounted dist)
        working-directory: apps/hub/frontend
        run: |
          npm ci || npm install
          npm run build

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/hub/pyproject.toml

      - name: Install hub (with test extras)
        run: pip install -e "apps/hub[test]"

      - name: Run test suite
        run: python -m pytest tests/ -q
